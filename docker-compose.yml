version: '3.8'

services:
  backend:
    build: ./backend
    container_name: proofmatch-backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - AUTH_DISABLED=true
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-proofmatch-ai}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-proofmatch-uploads}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-proofmatch-ai}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8080
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: proofmatch-frontend
    environment:
      - BACKEND_URL=http://backend:8080
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
