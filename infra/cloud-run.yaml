# Cloud Run Service Configuration — Backend
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: proofmatch-backend
  labels:
    cloud.googleapis.com/location: asia-south1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 120
      containers:
        - image: asia-south1-docker.pkg.dev/PROJECT_ID/proofmatch/proofmatch-backend:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: APP_ENV
              value: "production"
            - name: AUTH_DISABLED
              value: "false"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: GEMINI_API_KEY
                  key: latest
            - name: GCS_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: GCS_BUCKET_NAME
                  key: latest
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: GOOGLE_CLOUD_PROJECT
                  key: latest
---
# Cloud Run Service Configuration — Frontend
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: proofmatch-frontend
  labels:
    cloud.googleapis.com/location: asia-south1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 200
      timeoutSeconds: 60
      containers:
        - image: asia-south1-docker.pkg.dev/PROJECT_ID/proofmatch/proofmatch-frontend:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
